name: Weekly Groww Pulse

on:
  schedule:
    # Monday 9:00 AM IST = 03:30 UTC (IST = UTC+5:30)
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[api]"

      - name: Run weekly pulse pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          MCP_PROFILE: remote
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
        run: groww-pulse-phase8

      - name: Sync artifacts to Render API
        if: success() && secrets.RENDER_API_URL != '' && secrets.API_KEY != ''
        env:
          RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: groww-pulse-phase9-sync --remote-url "$RENDER_API_URL"

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-pulse-${{ github.run_id }}
          path: |
            data/analysis/weekly_run.json
            data/analysis/run_history.json
            data/analysis/themes.json
            data/analysis/insights.json
            data/analysis/weekly_note.md
            data/analysis/weekly_note.json
            data/analysis/groq_usage.json
            data/analysis/run_metadata.json
            data/analysis/doc_delivery.json
            data/analysis/draft_delivery.json
            data/scrubbed/pii_scrub_report.json
          retention-days: 90
